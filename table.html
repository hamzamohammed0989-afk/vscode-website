    <title>Table</title>

        }

            border-radius: 15px;
        }
        th, td{
            border: 2px solid rgb(219, 10, 27);
            padding: 20px;
            text-align: center;
        }
        th{
            background-color: #4a6cf7;

        }

    </style>
</head>
