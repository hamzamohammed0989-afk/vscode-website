<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logout - Student Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }
    .sidebar {
      width: 200px;
      background-color: #2c3e50;
      color: #fff;
      height: 100vh;
      padding-top: 20px;
    }
    .sidebar a {
      display: block;
      color: #fff;
      padding: 12px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #34495e;
    }
    .main {
      flex: 1;
      padding: 20px;
    }
    h1 {
      color: #fff;
      background-color: #2c3e50;
      text-align: center;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    p{
        color: red;
    }
    h3{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    h4{
        text-align: center;
    }
    .logout-message {
      max-width: 600px;
      margin: 0 auto;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .logout-message p {
      margin: 15px 0;
      font-size: 16px;
    }
    .btn-home {
      background-color: #27ae60;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
    }
    .btn-home:hover {
      background-color: #219150;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h4>Dashboard</h4>
    <a href="#">Home</a>
    <a href="#">Students</a>
    <a href="#">Settings</a>
    <a href="#">Logout</a>
  </div>
  <div class="main">
    <h1>Logout</h1>
    <div class="logout-message">
      <p>You are now logged out.</p>
      <h3>Thank you for using the Student Dashboard. Click below to return to the homepage or log back in.</h3>
      <button class="btn-home">Return to Home</button>
    </div>
  </div>
</body>
</html>
