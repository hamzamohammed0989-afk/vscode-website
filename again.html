<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: antiquewhite;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        #wrapper{
            width: 80%;
            padding: 20px;
            margin: auto;
            border: 2px solid salmon;
            border-radius: 15px;
        }
        header{
            background-color: aqua;
            color: blue;
            font-size: 80px;
            padding: 15px;
            text-align: center;
        }
        nav{
            float: left;
            width: 150px;
            padding: 10px;
            background-color: cadetblue;
            color: white;
            min-height: 300px;
        }
        main{
            margin-left: 170px;
            padding: 10px;
            background-color: rgb(160, 95, 131);
            color: white;
            min-height: 300px;
        }
        footer{
            background-color: coral;
            text-align: center;
            padding: 25px;
            clear: both;

        }
        nav a{
            text-decoration: none;
            display: block;
            margin-top: 10px;

            &hover{
                background-color: blanchedalmond;
                padding: 10px;
            }
        }

        
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- header -->
         <header>
            Welcome to the school
         </header>
         <!-- nav -->
          <nav>
            <a href="#">home</a>
            <a href="#">about</a>
            <a href="#">news</a>
            <a href="#">contact us</a>
          </nav>
          <!-- main -->
           <main>
            <h1>Welcome to the school management system</h1>
            <p>this is were students can manage</p>
            <p>best system management</p>
            <p>Make sure to use as right way......</p>
           </main>
           <!-- footer -->
            <footer>
                all copyright received by CA252
            </footer>

    </div>
</body>
</html>
