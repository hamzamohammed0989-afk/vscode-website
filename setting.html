<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings - Student Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }
    .sidebar {
      width: 200px;
      background-color: #2c3e50;
      color: #fff;
      height: 100vh;
      padding-top: 20px;
    }
    .sidebar a {
      display: block;
      color: #fff;
      padding: 12px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #34495e;
    }
    .main {
      flex: 1;
      padding: 20px;
    }
    h1 {
      color: #fff;
      background-color: #2c3e50;
      text-align: center;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    h2{
        text-align: center;
    }
    .form-container {
      max-width: 500px;
      margin: 0 auto;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .btn-save {
      background-color: #27ae60;
      color: white;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      font-size: 16px;
    }
    .btn-save:hover {
      background-color: #219150;
      border: 10px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Dashboard</h2>
    <a href="dashboard.html">Home</a>
    <a href="sinf.html">Students</a>
    <a href="setting.html">Settings</a>
    <a href="logout.html">Logout</a>
  </div>
  <div class="main">
    <h1>Settings</h1>
    <div class="form-container">
      <h2>Profile Settings</h2>
      <form>
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Your email address">

        <label for="theme">Theme</label>
        <select id="theme">
          <option value="light">Light</option>
          <option value="dark" selected>Dark</option>
        </select>

        <button type="submit" class="btn-save">Save Settings</button>
      </form>
    </div>
  </div>
</body>
</html>
