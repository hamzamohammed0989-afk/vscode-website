<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Information Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }
    .sidebar {
      width: 200px;
      background-color: #2c3e50;
      color: #fff;
      height: 100vh;
      padding-top: 20px;
    }
    .sidebar a {
      display: block;
      color: #fff;
      padding: 12px;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #34495e;
    }
    .main {
      flex: 1;
      padding: 20px;
    }
    h1 {
      color: #fff; /* Title text color */
      background-color: #2c3e50; /* Title background color */
      text-align: center;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    h2{
        text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th {
      background-color: #0e7ded; /* Thead background */
      color: #fff; /* Thead text color */
      padding: 12px;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2; /* Alternate row color */
    }
    td {
      padding: 10px;
      text-align: center;
    }
    .btn-edit {
      background-color: #27ae60;
      color: white;
      padding: 5px 10px;
      border: none;
      cursor: pointer;
      border-radius: 10px;
    }
    .btn-delete {
      background-color: #e74c3c;
      color: white;
      padding: 5px 10px;
      border: none;
      cursor: pointer;
      border-radius: 10px;
    }
    .student-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    tr{
        border-radius: 50%;
    }
    
    
  </style>
</head>
<body>
    
  <div class="sidebar">
    <h2>Dashboard</h2>
    
    <a href="dashboard.html">Home</a>
    <a href="sinf.html">Students</a>
    <a href="setting.html">Settings</a>
    <a href="logout.html">Logout</a>
  </div>
  <div class="main">

    <table>

          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>

      </tbody>
    </table>
  </div>
</body>
</html>
